<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fashion Retail Store — Weekly Input Form</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f4f0; color:#1a1a18; }
header { background:#185FA5; color:white; padding:18px 32px; }
header h1 { font-size:17px; font-weight:500; }
header p  { font-size:12px; opacity:.8; margin-top:3px; }
.container { max-width:680px; margin:32px auto; padding:0 20px; }
.card { background:white; border-radius:10px; border:0.5px solid #e0dfd8; padding:20px 24px; margin-bottom:20px; }
.card-title { font-size:11px; font-weight:500; color:#888780; text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
label { font-size:12px; color:#888780; display:block; margin-bottom:4px; }
input, select { width:100%; height:36px; border:0.5px solid #d3d1c7; border-radius:8px; padding:0 10px; font-size:13px; background:white; color:#1a1a18; outline:none; }
input:focus { border-color:#185FA5; box-shadow:0 0 0 2px rgba(24,95,165,.12); }
.advisor-table { width:100%; border-collapse:collapse; }
.advisor-table th { font-size:11px; color:#888780; font-weight:500; text-align:left; padding:6px 8px; border-bottom:1px solid #f0efe8; }
.advisor-table td { padding:6px 4px; border-bottom:0.5px solid #f5f4f0; }
.advisor-table td input { height:32px; font-size:13px; }
.advisor-table tr:last-child td { border-bottom:none; }
.btn { display:block; width:100%; height:44px; background:#185FA5; color:white; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; margin-top:8px; }
.btn:hover { background:#0C447C; }
.btn-add { background:transparent; border:0.5px solid #d3d1c7; color:#888780; font-size:12px; height:32px; border-radius:6px; cursor:pointer; padding:0 12px; margin-top:8px; }
.btn-add:hover { border-color:#185FA5; color:#185FA5; }
.btn-remove { background:transparent; border:none; color:#d3d1c7; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; }
.btn-remove:hover { color:#A32D2D; }
.hint { font-size:11px; color:#888780; margin-top:6px; }
</style>
</head>
<body>

<header>
  <h1>Fashion Retail Store — Weekly Competition</h1>
  <p>Fill in this week's data and generate the dashboard</p>
</header>

<div class="container">

  <div class="card">
    <p class="card-title">Week settings</p>
    <div class="row3">
      <div>
        <label>Week number</label>
        <input type="number" id="hafta_no" value="1" min="1" max="52">
      </div>
      <div>
        <label>End date</label>
        <input type="date" id="hafta_bitis" value="2026-02-07">
      </div>
      <div>
        <label>Days remaining</label>
        <input type="number" id="kalan_gun" value="5" min="0" max="7">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Targets</p>
    <div class="row2">
      <div>
        <label>Weekly target per advisor (₽)</label>
        <input type="number" id="haftalik_hedef" value="450000" step="10000">
      </div>
      <div>
        <label>Score formula</label>
        <select id="score_formula">
          <option value="60-40">60% revenue + 40% avg ticket</option>
          <option value="70-30">70% revenue + 30% avg ticket</option>
          <option value="50-50">50% revenue + 50% avg ticket</option>
          <option value="100-0">100% revenue only</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Advisor data</p>
    <table class="advisor-table">
      <thead>
        <tr>
          <th style="width:36px;"></th>
          <th>Advisor name</th>
          <th>Revenue (₽)</th>
          <th>Transactions</th>
        </tr>
      </thead>
      <tbody id="advisorRows">
      </tbody>
    </table>
    <button class="btn-add" onclick="addRow()">+ Add advisor</button>
    <p class="hint">Avg ticket = revenue ÷ transactions (calculated automatically)</p>
  </div>

  <button class="btn" onclick="generateDashboard()">Generate dashboard &amp; download</button>

</div>

<script>
const DEFAULT_ADVISORS = [
  ["Advisor_A",    320000, 18],
  ["Advisor_B", 280000, 15],
  ["Advisor_C",        260000, 14],
  ["Advisor_D",  210000, 11],
  ["Advisor_E",      190000, 12],
  ["Advisor_F",   175000, 10],
  ["Advisor_G",    160000, 11],
  ["Advisor_H",     140000,  9],
  ["Advisor_I",       120000,  8],
  ["Advisor_J",   110000,  7],
  ["Advisor_K",     80000,  6],
];

function addRow(name="", ciro=0, islem=0) {
  const tbody = document.getElementById("advisorRows");
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><button class="btn-remove" onclick="this.closest('tr').remove()">×</button></td>
    <td><input type="text"   class="adv-name"  value="${name}"  placeholder="Name"></td>
    <td><input type="number" class="adv-ciro"  value="${ciro}"  min="0" step="1000"></td>
    <td><input type="number" class="adv-islem" value="${islem}" min="0"></td>
  `;
  tbody.appendChild(tr);
}

DEFAULT_ADVISORS.forEach(([n,c,i]) => addRow(n,c,i));

function getFormula() {
  const v = document.getElementById("score_formula").value;
  const [a,b] = v.split("-").map(Number);
  return [a/100, b/100];
}

function generateDashboard() {
  const hafta_no     = parseInt(document.getElementById("hafta_no").value);
  const hafta_bitis  = document.getElementById("hafta_bitis").value;
  const kalan_gun    = parseInt(document.getElementById("kalan_gun").value);
  const hedef        = parseInt(document.getElementById("haftalik_hedef").value);
  const [w_ciro, w_ticket] = getFormula();

  const rows = document.querySelectorAll("#advisorRows tr");
  const players = [];
  rows.forEach(tr => {
    const name  = tr.querySelector(".adv-name")?.value.trim();
    const ciro  = parseInt(tr.querySelector(".adv-ciro")?.value) || 0;
    const islem = parseInt(tr.querySelector(".adv-islem")?.value) || 0;
    if (name) players.push({name, ciro, islem, ticket: islem > 0 ? Math.round(ciro/islem) : 0});
  });

  if (players.length === 0) { alert("Please enter advisor data"); return; }

  const store_total = players.reduce((s,p) => s+p.ciro, 0);
  const max_ciro   = Math.max(...players.map(p=>p.ciro));
  const max_ticket = Math.max(...players.map(p=>p.ticket));
  const week_prog  = Math.round((7-kalan_gun)/7*100);

  players.forEach(p => {
    const cs = max_ciro   ? p.ciro/max_ciro     : 0;
    const ts = max_ticket ? p.ticket/max_ticket : 0;
    p.score      = Math.round((cs*w_ciro + ts*w_ticket)*100*10)/10;
    p.target_pct = Math.min(Math.round(p.ciro/hedef*100), 150);
    p.gap        = Math.max(0, hedef - p.ciro);
  });
  players.sort((a,b) => b.score - a.score);
  players.forEach((p,i) => p.rank = i+1);

  const medals = ["#EF9F27","#888780","#BA7517"];
  const avg_ticket = Math.round(players.reduce((s,p)=>s+p.ticket,0)/players.length);
  const on_target  = players.filter(p=>p.target_pct>=100).length;

  const tableRows = players.map(p => {
    const medal     = medals[p.rank-1] || "#B5D4F4";
    const rank_icon = p.rank===1?"🥇":p.rank===2?"🥈":p.rank===3?"🥉":`${p.rank}.`;
    const gap_text  = p.gap===0 ? "✓ Target reached" : `₽${p.gap.toLocaleString()} to go`;
    const gap_color = p.gap===0 ? "#3B6D11" : "#A32D2D";
    const bar_w     = Math.min(p.target_pct, 100);
    const bar_color = p.target_pct>=100?"#3B6D11":p.target_pct>=60?"#EF9F27":"#A32D2D";
    return `<tr class="${p.rank<=3?'top3':''}">
      <td style="width:44px;text-align:center;font-size:20px;">${rank_icon}</td>
      <td>
        <div style="font-weight:500;font-size:14px;">${p.name}</div>
        <div style="margin-top:5px;background:#f0efe8;border-radius:4px;height:6px;width:180px;">
          <div style="background:${bar_color};height:6px;border-radius:4px;width:${bar_w}%;"></div>
        </div>
      </td>
      <td style="text-align:right;font-size:15px;font-weight:500;">₽${p.ciro.toLocaleString()}</td>
      <td style="text-align:right;color:#888780;font-size:13px;">₽${p.ticket.toLocaleString()}</td>
      <td style="text-align:right;font-size:18px;font-weight:500;color:${medal};">${p.score}</td>
      <td style="text-align:right;font-size:12px;color:${gap_color};">${gap_text}</td>
    </tr>`;
  }).join("");

  const podium = [1,0,2].map((pos,idx) => {
    if (pos >= players.length) return "";
    const p = players[pos];
    const heights = ["180px","220px","160px"];
    const labels  = ["2nd","1st","3rd"];
    const colors  = ["#888780","#EF9F27","#BA7517"];
    const icons   = ["🥈","🥇","🥉"];
    return `<div style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;">
      <div style="font-size:12px;color:#888780;margin-bottom:4px;">${labels[idx]}</div>
      <div style="background:${colors[idx]};color:white;border-radius:10px 10px 0 0;padding:16px 24px;
                  height:${heights[idx]};display:flex;flex-direction:column;align-items:center;
                  justify-content:center;min-width:120px;">
        <div style="font-size:28px;margin-bottom:6px;">${icons[idx]}</div>
        <div style="font-weight:500;font-size:14px;">${p.name}</div>
        <div style="font-size:13px;margin-top:4px;">₽${p.ciro.toLocaleString()}</div>
        <div style="font-size:11px;opacity:.85;margin-top:2px;">score: ${p.score}</div>
      </div>
    </div>`;
  }).join("");

  const formula_label = `${Math.round(w_ciro*100)}% revenue + ${Math.round(w_ticket*100)}% avg ticket`;

  const html = `<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fashion Retail Store — Week ${hafta_no} Competition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18}
header{background:#185FA5;color:white;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:500}
header .sub{font-size:13px;opacity:.8}
.container{max-width:900px;margin:0 auto;padding:28px 24px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.metric{background:white;border-radius:10px;padding:14px 16px;border:0.5px solid #e0dfd8}
.metric-label{font-size:11px;color:#888780;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-val{font-size:22px;font-weight:500}
.metric-sub{font-size:11px;color:#888780;margin-top:3px}
.week-progress{background:white;border-radius:10px;padding:16px 20px;margin-bottom:28px;border:0.5px solid #e0dfd8}
.week-label{display:flex;justify-content:space-between;font-size:12px;color:#888780;margin-bottom:8px}
.week-track{background:#f0efe8;border-radius:6px;height:10px}
.week-fill{background:#185FA5;height:10px;border-radius:6px;width:${week_prog}%}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:32px}
.sec{font-size:11px;color:#888780;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
table{width:100%;background:white;border-radius:10px;border:0.5px solid #e0dfd8;border-collapse:collapse;overflow:hidden}
table th{padding:12px 14px;text-align:left;font-size:11px;color:#888780;font-weight:500;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #f0efe8}
table td{padding:14px 14px;border-bottom:0.5px solid #f5f4f0;vertical-align:middle}
table tr:last-child td{border-bottom:none}
table tr.top3{background:#fafaf8}
</style></head><body>
<header>
  <div>
    <h1>Fashion Retail Store — Sales Competition</h1>
    <div class="sub">Week ${hafta_no} &nbsp;|&nbsp; Ends ${hafta_bitis} &nbsp;|&nbsp; ${kalan_gun} days remaining</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:24px;font-weight:500">₽${store_total.toLocaleString()}</div>
    <div style="font-size:12px;opacity:.8">store total this week</div>
  </div>
</header>
<div class="container">
  <div class="metrics">
    <div class="metric"><p class="metric-label">Weekly target</p><p class="metric-val">₽${hedef.toLocaleString()}</p><p class="metric-sub">per advisor</p></div>
    <div class="metric"><p class="metric-label">On target</p><p class="metric-val">${on_target}/${players.length}</p><p class="metric-sub">advisors</p></div>
    <div class="metric"><p class="metric-label">Store avg ticket</p><p class="metric-val">₽${avg_ticket.toLocaleString()}</p><p class="metric-sub">this week</p></div>
    <div class="metric"><p class="metric-label">Score formula</p><p class="metric-val" style="font-size:13px">${formula_label}</p></div>
  </div>
  <div class="week-progress">
    <div class="week-label"><span>Week progress</span><span>${week_prog}% — ${7-kalan_gun} of 7 days</span></div>
    <div class="week-track"><div class="week-fill"></div></div>
  </div>
  <p class="sec" style="margin-bottom:20px">Top 3 this week</p>
  <div class="podium">${podium}</div>
  <p class="sec">Full leaderboard</p>
  <table>
    <thead><tr>
      <th></th><th>Advisor</th>
      <th style="text-align:right">Revenue</th>
      <th style="text-align:right">Avg ticket</th>
      <th style="text-align:right">Score</th>
      <th style="text-align:right">Status</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <p style="font-size:11px;color:#888780;margin-top:20px;text-align:center">
    Score = (revenue/max × ${Math.round(w_ciro*100)}%) + (avg_ticket/max × ${Math.round(w_ticket*100)}%) × 100 &nbsp;|&nbsp; Updated every Monday
  </p>
</div></body></html>`;

  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `fashion_retail_week${hafta_no}_competition.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
